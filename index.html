<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termo Battle Royale 👑</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --color-correct: #538d4e;
            --color-present: #b59f3b;
            --color-absent: #3a3a3c;
            --color-bg: #121213;
            --color-grid-bg: #1a1a1c;
            --color-border: #3a3a3c;
            --color-text: #ffffff;
            --color-disabled: #222224;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--color-bg); color: var(--color-text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .screen { display: none; width: 100%; max-width: 900px; text-align: center; }
        .screen.active { display: block; }

        h1 { margin-bottom: 10px; font-size: 2.5rem; letter-spacing: 2px; }
        p { color: #86868b; margin-bottom: 20px; }

        /* Setup Screen */
        .auth-container { background: #1c1c1e; padding: 30px; border-radius: 12px; border: 1px solid var(--color-border); max-width: 400px; margin: 20px auto; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #2c2c2e; border: 1px solid var(--color-border); color: white; border-radius: 6px; font-size: 1rem; text-align: center; }
        button { width: 100%; padding: 12px; background: var(--color-correct); border: none; color: white; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        button:hover { background: #43723f; }
        .btn-secondary { background: #48484a; }
        .btn-secondary:hover { background: #3a3a3c; }
        .divider { margin: 20px 0; color: #86868b; font-size: 0.9rem; }

        /* Game Screen Layout */
        .game-layout { display: flex; flex-direction: row; gap: 30px; justify-content: center; align-items: flex-start; margin-top: 20px; flex-wrap: wrap; }
        .main-game-area { flex: 1; min-width: 300px; max-width: 450px; }
        
        /* Room Info & Timer */
        .status-panel { background: #1c1c1e; padding: 15px; border-radius: 8px; border: 1px solid var(--color-border); margin-bottom: 20px; }
        #timer-display { font-size: 1.5rem; font-weight: bold; color: #ff453a; margin-top: 5px; display: none; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* Lobby System UI */
        .lobby-container { background: #2c2c2e; padding: 15px; border-radius: 8px; margin-top: 10px; border: 1px solid #444; }
        .btn-copy { display: inline-block; width: auto; padding: 4px 10px; font-size: 0.8rem; margin-left: 10px; background: #48484a; margin-top: 0; }
        .btn-ready { background: var(--color-present); }
        .btn-ready:hover { background: #968331; }
        .btn-start { background: var(--color-correct); font-size: 1.1rem; }

        /* Wordle Grid */
        .grid { display: grid; grid-template-rows: repeat(6, 1fr); gap: 5px; margin-bottom: 20px; }
        .grid-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; transition: all 0.5s ease; }
        .grid-row.eliminated { opacity: 0.2; transform: scale(0.95); pointer-events: none; background: #ff453a22; }
        .cell { aspect-ratio: 1; border: 2px solid var(--color-border); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: bold; text-transform: uppercase; background: var(--color-grid-bg); }
        .cell.correct { background-color: var(--color-correct); border-color: var(--color-correct); }
        .cell.present { background-color: var(--color-present); border-color: var(--color-present); }
        .cell.absent { background-color: var(--color-absent); border-color: var(--color-absent); }

        /* Keyboard & Feedback Colors */
        .keyboard { display: flex; flex-direction: column; gap: 6px; }
        .key-row { display: flex; justify-content: center; gap: 4px; }
        .key { background: #818384; border: none; color: white; padding: 14px 10px; border-radius: 4px; font-weight: bold; cursor: pointer; flex: 1; text-transform: uppercase; font-size: 0.9rem; user-select: none; transition: background 0.2s; }
        .key.wide { flex: 1.5; }
        .key.correct { background-color: var(--color-correct) !important; }
        .key.present { background-color: var(--color-present) !important; }
        .key.absent { background-color: var(--color-absent) !important; }

        /* Spectator Panel */
        .spectator-panel { flex: 1; min-width: 300px; max-width: 400px; background: #1c1c1e; border: 1px solid var(--color-border); border-radius: 12px; padding: 20px; max-height: 70vh; overflow-y: auto; }
        .spectator-panel h2 { font-size: 1.3rem; margin-bottom: 15px; border-bottom: 1px solid var(--color-border); padding-bottom: 10px; }
        .player-card { background: #2c2c2e; padding: 10px; border-radius: 6px; margin-bottom: 10px; border-left: 5px solid #86868b; text-align: left; }
        .player-card.ganhou { border-left-color: var(--color-correct); }
        .player-card.perdeu { border-left-color: #ff453a; }
        .player-card-header { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
        
        /* Mini Grid for Spectating */
        .mini-grid { display: grid; grid-template-rows: repeat(6, 1fr); gap: 2px; width: 80px; margin-top: 5px; }
        .mini-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }
        .mini-cell { width: 14px; height: 14px; border: 1px solid #444; background: #1a1a1c; }
        .mini-cell.c { background: var(--color-correct); }
        .mini-cell.p { background: var(--color-present); }
        .mini-cell.a { background: var(--color-absent); }

        /* Overlay Alerts */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 100; }
        .overlay-content { background: #1c1c1e; padding: 40px; border-radius: 12px; border: 1px solid var(--color-border); text-align: center; max-width: 400px; }
        .overlay h2 { font-size: 2rem; margin-bottom: 10px; }

        /* Banner de Anúncios */
        .banner-carousel { margin-top: 20px; width: 100%; text-align: center; border-radius: 8px; overflow: hidden; border: 1px solid var(--color-border); background: #1c1c1e; max-height: 80px; display: flex; justify-content: center; align-items: center; }
        .banner-carousel img { max-width: 100%; height: auto; max-height: 80px; display: block; cursor: pointer; transition: transform 0.2s; }
        .banner-carousel img:hover { transform: scale(1.02); }
    </style>
</head>
<body>

    <div id="screen-setup" class="screen active">
        <h1>TERMO BATTLE ROYALE 👑</h1>
        <p>O último sobrevivente que adivinhar a palavra vence!</p>
        
        <div class="auth-container">
            <input type="text" id="input-username" placeholder="Seu Nome / Nickname" maxlength="12" autocomplete="off">
            <input type="text" id="input-avatar" placeholder="URL da Imagem de Perfil (ou Base64)" autocomplete="off">
            
            <div class="divider">---</div>
            
            <label style="display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 12px; cursor: pointer; font-size: 0.95rem;">
                <input type="checkbox" id="check-room-public" style="width: auto; margin: 0;"> Tornar esta Sala Pública 🌐
            </label>
            
            <button onclick="criarNovaSala()">Criar Nova Sala</button>
            <div class="divider">OU</div>
            <input type="text" id="input-room-id" placeholder="Código da Sala (Ex: 4812)">
            <button onclick="entrarNaSala()" class="btn-secondary">Entrar na Sala</button>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="abrirFormularioSugestao()" class="btn-secondary" style="margin-top:0; padding: 8px; font-size: 0.85rem;">💡 Sugestão</button>
                <button onclick="abrirFormularioAnuncio()" class="btn-secondary" style="margin-top:0; padding: 8px; font-size: 0.85rem;">📢 Anuncie Aqui</button>
            </div>
        </div>

        <div class="auth-container" style="margin-top: 20px;">
            <h3 style="margin-bottom: 10px; font-size: 1.1rem; color: var(--color-present);">Salas Públicas Ativas 🌐</h3>
            <div id="public-rooms-list" style="display: flex; flex-direction: column; gap: 8px; max-height: 200px; overflow-y: auto;">
                <p style="color: #86868b; font-size: 0.9rem;">Procurando salas abertas...</p>
            </div>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div class="status-panel">
            <h3 id="room-title">SALA: ---- <button class="btn-copy" id="btn-copy-code" onclick="copiarCodigoSala()">Copiar Código</button></h3>
            
            <div id="lobby-panel" class="lobby-container">

            </div>

            <div id="timer-message" style="margin-top: 10px;">Aguardando a partida iniciar...</div>
            <div id="timer-display">02:00</div>
        </div>

        <div class="game-layout">
            <div class="main-game-area" id="player-area">
                <div class="grid" id="board-grid"></div>

                <div class="keyboard" id="game-keyboard">
                    <div class="key-row">
                        <button class="key" id="key-Q" onclick="pressKey('Q')">Q</button>
                        <button class="key" id="key-W" onclick="pressKey('W')">W</button>
                        <button class="key" id="key-E" onclick="pressKey('E')">E</button>

                        <button class="key" id="key-T" onclick="pressKey('T')">T</button>

                        <button class="key" id="key-U" onclick="pressKey('U')">U</button>
                        <button class="key" id="key-I" onclick="pressKey('I')">I</button>
                        <button class="key" id="key-O" onclick="pressKey('O')">O</button>
                        <button class="key" id="key-P" onclick="pressKey('P')">P</button>
                    </div>
                    <div class="key-row">
                        <button class="key" id="key-A" onclick="pressKey('A')">A</button>
                        <button class="key" id="key-S" onclick="pressKey('S')">S</button>
                        <button class="key" id="key-D" onclick="pressKey('D')">D</button>
                        <button class="key" id="key-F" onclick="pressKey('F')">F</button>
                        <button class="key" id="key-G" onclick="pressKey('G')">G</button>
                        <button class="key" id="key-H" onclick="pressKey('H')">H</button>
                        <button class="key" id="key-J" onclick="pressKey('J')">J</button>
                        <button class="key" id="key-K" onclick="pressKey('K')">K</button>
                        <button class="key" id="key-L" onclick="pressKey('L')">L</button>
                        <button class="key wide" onclick="pressKey('BACKSPACE')">⌫</button>
                    </div>
                    <div class="key-row">
                        <button class="key" id="key-Z" onclick="pressKey('Z')">Z</button>
                        <button class="key" id="key-X" onclick="pressKey('X')">X</button>
                        <button class="key" id="key-C" onclick="pressKey('C')">C</button>
                        <button class="key" id="key-V" onclick="pressKey('V')">V</button>
                        <button class="key" id="key-B" onclick="pressKey('B')">B</button>
                        <button class="key" id="key-N" onclick="pressKey('N')">N</button>
                        <button class="key" id="key-M" onclick="pressKey('M')">M</button>
                        <button class="key wide" onclick="pressKey('ENTER')">ENTER</button>
                    </div>
                </div>

                <div class="banner-carousel">
                    <a id="banner-redirect" href="#" target="_blank">
                        <img id="banner-media" src="" alt="Anúncio">
                    </a>
                </div>
            </div>

            <div class="spectator-panel">
                <h2>Live Jogadores (Espectador) 👁️</h2>
                <div id="spectator-list"></div>
            </div>
        </div>
    </div>

    <div id="game-overlay" class="overlay">
        <div class="overlay-content">
            <h2 id="overlay-title">FIM DE JOGO</h2>
            <p id="overlay-body"></p>
            <button onclick="fecharOverlay()" class="btn-secondary">Voltar para o Jogo (Espectar)</button>
        </div>

        function criarNovaSala() {
            username = document.getElementById('input-username').value.trim();
            const avatarUrl = document.getElementById('input-avatar').value.trim();
            
            if (!username) return alert("Insira um nome válido!");
            
            localStorage.setItem('termo_br_username', username);
            localStorage.setItem('termo_br_avatar', avatarUrl);
            
            roomId = Math.floor(1000 + Math.random() * 9000).toString();
            const palavraEscolhida = DICIONARIO[Math.floor(Math.random() * DICIONARIO.length)];
            const ehPublica = document.getElementById('check-room-public').checked;

            database.ref('salas/' + roomId).set({
                palavra: palavraEscolhida,

                publica: ehPublica
            }).then(() => {

                entrarNaSalaComId(roomId);

        function ouvirSalasPublicas() {
            database.ref('salas').on('value', (snapshot) => {
                const todasAsSalas = snapshot.val();
                const containerLista = document.getElementById('public-rooms-list');
                containerLista.innerHTML = "";

                let encontrouSala = false;

                if (todasAsSalas) {
                    for (let id in todasAsSalas) {
                        const sala = todasAsSalas[id];
                        if (sala.publica === true && sala.status === "lobby") {
                            encontrouSala = true;
                            let qtdJogadores = sala.jogadores ? Object.keys(sala.jogadores).length : 0;

                            const itemSala = document.createElement('div');
                            itemSala.style = "display: flex; justify-content: space-between; align-items: center; background: #2c2c2e; padding: 10px; border-radius: 6px; border: 1px solid var(--color-border);";
                            itemSala.innerHTML = `

                                    <span style="font-weight: bold; color: var(--color-present);">Sala #${id}</span>
                                    <div style="font-size: 0.8rem; color: #86868b;">Host: ${sala.host} | ${qtdJogadores} jog.</div>

                                <button onclick="clicarEntrarSalaPublica('${id}')" style="width: auto; margin: 0; padding: 6px 12px; font-size: 0.85rem;">Entrar</button>
                            `;
                            containerLista.appendChild(itemSala);
                        }
                    }
                }
                if (!encontrouSala) {
                    containerLista.innerHTML = '<p style="color: #86868b; font-size: 0.9rem; margin: 5px 0;">Nenhuma sala pública disponível no momento.</p>';

            });

            roomId = idDaSala;
            entrarNaSalaComId(roomId);

        function entrarNaSala() {
            username = document.getElementById('input-username').value.trim();
            const avatarUrl = document.getElementById('input-avatar').value.trim();
            roomId = document.getElementById('input-room-id').value.trim();
            
            if (!username || !roomId) return alert("Preencha o nome e o código da sala!");
            
            localStorage.setItem('termo_br_username', username);
            localStorage.setItem('termo_br_avatar', avatarUrl);
            
            database.ref('salas/' + roomId).once('value', (snapshot) => {
                if (snapshot.exists()) {
                    if (snapshot.val().status === "jogando") {
                        return alert("A partida nessa sala já começou!");
                    }
                    entrarNaSalaComId(roomId);
                } else {
                    alert("Sala não encontrada!");
                }
            });
        }

        function entrarNaSalaComId(id) {
            roomId = id; 
            document.getElementById('screen-setup').classList.remove('active');
            document.getElementById('screen-game').classList.add('active');
            document.getElementById('room-title').innerHTML = `SALA: <span style="color:var(--color-present)">${id}</span> <button class="btn-copy" id="btn-copy-code" onclick="copiarCodigoSala()">Copiar</button>`;

            atualizarMeuStatusNoFirebase();

            database.ref('salas/' + id).on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                palavraSecreta = data.palavra.toUpperCase();
                roomStatus = data.status;

                if (data.host === username) amIHost = true;

                const lobbyPanel = document.getElementById('lobby-panel');
                const playerArea = document.getElementById('player-area');
                const hostStartBtn = document.getElementById('btn-host-start');
                const timerMsg = document.getElementById('timer-message');

                if (roomStatus === "lobby") {
                    if (jogoIniciado) {
                        resetarTabuleiroLocal();
                        jogoIniciado = false;
                    }
                    lobbyPanel.style.display = "block";
                    playerArea.style.opacity = "0.25";
                    playerArea.style.pointerEvents = "none";
                    timerMsg.innerText = "Aguardando início no lobby...";
                    
                    if (amIHost) {
                        hostStartBtn.style.display = "block";
                        const btnReset = document.getElementById('btn-host-reset');
                        if (btnReset) btnReset.style.display = "none";
                    }

                    if (data.jogadores) {
                        const listaJogadores = Object.values(data.jogadores);
                        const totalJogadores = listaJogadores.length;
                        const prontos = listaJogadores.filter(p => p.ready).length;
                        
                        document.getElementById('lobby-status-desc').innerText = `Jogadores prontos: ${prontos} / ${totalJogadores}`;

                        if (totalJogadores > 0 && prontos === totalJogadores && amIHost) {
                            database.ref('salas/' + id).update({ status: "jogando" });
                        }
                    }
                } else if (roomStatus === "jogando") {
                    jogoIniciado = true;
                    lobbyPanel.style.display = "none";
                    if (myStatus === "jogando") {
                        playerArea.style.opacity = "1";
                        playerArea.style.pointerEvents = "all";
                    }
                    if (!data.timerStart) timerMsg.innerText = "Partida iniciada! Descubra a palavra secreta.";

                    // CHECAR SE TODOS OS JOGADORES TERMINARAM (GANHARAM OU PERDERAM)
                    if (data.jogadores) {
                        const listaJogadores = Object.values(data.jogadores);
                        const todosTerminaram = listaJogadores.every(p => p.status === "ganhou" || p.status === "perdeu");
                        
                        if (todosTerminaram) {
                            if (amIHost) {
                                lobbyPanel.style.display = "block";
                                hostStartBtn.style.display = "none";
                                document.getElementById('btn-ready-toggle').style.display = "none";
                                
                                let btnReset = document.getElementById('btn-host-reset');
                                if (!btnReset) {
                                    btnReset = document.createElement('button');
                                    btnReset.id = 'btn-host-reset';
                                    btnReset.className = 'btn-start';
                                    btnReset.style.marginTop = "10px";
                                    btnReset.style.backgroundColor = "#2f80ed";
                                    btnReset.innerText = 'Reiniciar Nova Partida 🔄';
                                    btnReset.onclick = reiniciarPartida;
                                    lobbyPanel.appendChild(btnReset);
                                }
                                btnReset.style.display = "block";
                                document.getElementById('lobby-status-desc').innerText = "Rodada finalizada! Todos os jogadores terminaram.";
                            } else {
                                timerMsg.innerText = "Fim de jogo! Aguardando o Host iniciar uma nova partida...";
                            }
                        } else {
                            const btnReset = document.getElementById('btn-host-reset');
                            if (btnReset) btnReset.style.display = "none";
                            document.getElementById('btn-ready-toggle').style.display = "block";
                        }
                    }
                }

                if (data.timerStart && !timerInterval) {
                    iniciarContagemRegressivaBR(data.timerStart);
                }

                if (data.jogadores) {
                    renderizarEspectadores(data.jogadores);
                }
            });

            window.addEventListener('keydown', handlePhysicalKeyboard);
        }

        function resetarTabuleiroLocal() {

            currentCol = 0;
            maxRowsAllowed = 6;
            myStatus = "jogando";
            isReady = false;
            
            guesses = [["","","","",""],["","","","",""],["","","","",""],["","","","",""],["","","","",""],["","","","",""]];
            gridStates = [["","","","",""],["","","","",""],["","","","",""],["","","","",""],["","","","",""],["","","","",""]];

        function handlePhysicalKeyboard(e) {
            if (myStatus !== "jogando" || roomStatus !== "jogando") return;
            const key = e.key.toUpperCase();
            if (key === 'ENTER') pressKey('ENTER');
            else if (key === 'BACKSPACE') pressKey('BACKSPACE');
            else if (/^[A-Z]$/.test(key)) pressKey(key);
        }

        function pressKey(key) {
            if (myStatus !== "jogando" || roomStatus !== "jogando") return;

            if (key === 'BACKSPACE') {
                if (currentCol > 0) {
                    currentCol--;
                    guesses[currentRow][currentCol] = "";
                    document.getElementById(`cell-${currentRow}-${currentCol}`).innerText = "";
                }
            } 
            else if (key === 'ENTER') {
                if (currentCol === 5) verificarPalpite();
                else alert("A palavra deve ter 5 letras!");
            } 
            else if (guesses[currentRow] && currentCol < 5) {
                guesses[currentRow][currentCol] = key;
                document.getElementById(`cell-${currentRow}-${currentCol}`).innerText = key;
                currentCol++;
            }
        }

        function verificarPalpite() {
            const palpiteArray = guesses[currentRow];
            const palavraDigitada = palpiteArray.join("").toUpperCase();

            if (!DICIONARIO.includes(palavraDigitada)) {
                alert(`⚠️ A palavra "${palavraDigitada}" não existe no dicionário!`);
                return; 
            }

            let corretoContagem = 0;
            let palavraCheck = palavraSecreta.split("");

            for (let i = 0; i < 5; i++) {
                const cell = document.getElementById(`cell-${currentRow}-${i}`);
                if (palpiteArray[i] === palavraSecreta[i]) {
                    cell.classList.add('correct');
                    gridStates[currentRow][i] = 'c';
                    palavraCheck[i] = null;
                    corretoContagem++;
                }
            }

            for (let i = 0; i < 5; i++) {
                if (gridStates[currentRow][i] === 'c') continue;
                const cell = document.getElementById(`cell-${currentRow}-${i}`);
                const indexNaPalavra = palavraCheck.indexOf(palpiteArray[i]);
                if (indexNaPalavra > -1) {
                    cell.classList.add('present');
                    gridStates[currentRow][i] = 'p';
                    palavraCheck[indexNaPalavra] = null;
                } else {
                    cell.classList.add('absent');
                    gridStates[currentRow][i] = 'a';
                }
            }

            for (let i = 0; i < 5; i++) {
                const letra = palpiteArray[i];
                const keyElement = document.getElementById(`key-${letra}`);
                if (keyElement) {
                    const statusLetra = gridStates[currentRow][i]; 
                    if (statusLetra === 'c') {
                        keyElement.classList.remove('present', 'absent');
                        keyElement.classList.add('correct');
                    } else if (statusLetra === 'p') {
                        if (!keyElement.classList.contains('correct')) {
                            keyElement.classList.remove('absent');
                            keyElement.classList.add('present');
                        }
                    } else if (statusLetra === 'a') {
                        if (!keyElement.classList.contains('correct') && !keyElement.classList.contains('present')) {
                            keyElement.classList.add('absent');
                        }
                    }
                }
            }

            atualizarMeuStatusNoFirebase();

            if (corretoContagem === 5) {
                myStatus = "ganhou";
                atualizarMeuStatusNoFirebase();
                database.ref('salas/' + roomId + '/timerStart').transaction((currentVal) => {
                    if (currentVal === null) return firebase.database.ServerValue.TIMESTAMP;
                });
                mostrarOverlay("VITÓRIA! 🎉", "Você adivinhou a palavra! Assista seus oponentes contra o relógio.");
                return;
            }

            currentRow++;
            currentCol = 0;

            if (currentRow >= maxRowsAllowed && myStatus === "jogando") {
                marcarComoDerrota("Acabaram suas tentativas!");
            }
        }

        function iniciarContagemRegressivaBR(timestampInicioServidor) {
            const msgElement = document.getElementById('timer-message');
            const timerElement = document.getElementById('timer-display');
            timerElement.style.display = "block";
            msgElement.innerText = "ALGUÉM ACERTOU! Corra contra o tempo!";

            timerInterval = setInterval(() => {
                database.ref('.info/serverTimeOffset').once('value', (snapshot) => {
                    const offset = snapshot.val() || 0;
                    const estimatedServerTime = Date.now() + offset;
                    const segundosDecorridos = Math.floor((estimatedServerTime - timestampInicioServidor) / 1000);
                    const tempoFase1 = 120;
                    
                    if (segundosDecorridos < tempoFase1) {
                        const tempoRestante = tempoFase1 - segundosDecorridos;
                        const mins = Math.floor(tempoRestante / 60).toString().padStart(2, '0');
                        const segs = (tempoRestante % 60).toString().padStart(2, '0');
                        timerElement.innerText = `${mins}:${segs}`;
                    } else {
                        const tempoExtra = segundosDecorridos - tempoFase1;
                        const linhasApagadas = Math.floor(tempoExtra / 15) + 1;
                        maxRowsAllowed = 6 - linhasApagadas;
                        if (maxRowsAllowed < 0) maxRowsAllowed = 0;

                        timerElement.innerText = "TEMPO ESGOTADO!";
                        msgElement.innerText = `Linhas destruídas! Máximo permitido: ${maxRowsAllowed}`;

                        for (let r = 0; r < 6; r++) {
                            const row = document.getElementById(`row-${r}`);
                            if (r >= maxRowsAllowed) row.classList.add('eliminated');
                        }

                        if (currentRow >= maxRowsAllowed && myStatus === "jogando") {
                            marcarComoDerrota("O tempo expirou e suas linhas foram deletadas!");
                        }
                    }
                });
            }, 1000);
        }

        function marcarComoDerrota(motivo) {
            myStatus = "perdeu";
            atualizarMeuStatusNoFirebase();
            mostrarOverlay("ELIMINADO 💀", `${motivo} A palavra correta era: ${palavraSecreta}.`);
            document.getElementById('game-keyboard').style.opacity = "0.3";
            document.getElementById('game-keyboard').style.pointerEvents = "none";
        }

        function atualizarMeuStatusNoFirebase() {
            if (!roomId || !username) return;
            const avatarUrl = document.getElementById('input-avatar').value.trim() || "";
            
            localStorage.setItem('termo_br_avatar', avatarUrl);

            database.ref('salas/' + roomId + '/jogadores/' + username).set({
                status: myStatus,
                linhaAtual: currentRow,
                grid: gridStates,
                ready: isReady,
                avatar: avatarUrl
            });
        }

        function renderizarEspectadores(jogadoresObjeto) {
            const container = document.getElementById('spectator-list');
            container.innerHTML = "";

            for (let player in jogadoresObjeto) {
                if (player === username) continue;

                const pData = jogadoresObjeto[player];
                const card = document.createElement('div');

                const header = document.createElement('div');
                header.className = 'player-card-header';
                
                let statusLabel = "📝 Jogando";
                if (roomStatus === "lobby") {
                    statusLabel = pData.ready ? "✅ Pronto" : "⏳ No Lobby";
                } else {
                    if (pData.status === "ganhou") statusLabel = "👑 Venceu!";
                    if (pData.status === "perdeu") statusLabel = "💀 Eliminado";
                }

                let imgAvatarHtml = `<span style="display:inline-block; width:22px; height:22px; border-radius:50%; background:#48484a; text-align:center; line-height:22px; font-size:0.75rem; margin-right:8px;">👤</span>`;
                if (pData.avatar && pData.avatar.trim() !== "") {
                    imgAvatarHtml = `<img src="${pData.avatar}" style="width:22px; height:22px; border-radius:50%; object-fit: cover; margin-right:8px; vertical-align: middle; border: 1px solid #555;">`;
                }

                header.innerHTML = `
                    <div style="display:flex; align-items:center;">
                        ${imgAvatarHtml}
                        <span>${player}</span>
                    </div>
                    <span>${statusLabel}</span>
                `;
                
                card.appendChild(header);

                const miniGrid = document.createElement('div');
                miniGrid.className = 'mini-grid';

                if (pData.grid) {
                    for (let r = 0; r < 6; r++) {
                        const mRow = document.createElement('div');
                        mRow.className = 'mini-row';
                        for (let c = 0; c < 5; c++) {
                            const mCell = document.createElement('div');
                            mCell.className = 'mini-cell';
                            if (pData.grid[r] && pData.grid[r][c]) mCell.classList.add(pData.grid[r][c]);
                            mRow.appendChild(mCell);
                        }
                        miniGrid.appendChild(mRow);
                    }
                }
                card.appendChild(miniGrid);
                container.appendChild(card);
            }
        }

        function mostrarOverlay(titulo, mensagem) {
            document.getElementById('overlay-title').innerText = titulo;
            document.getElementById('overlay-body').innerText = mensagem;
            document.getElementById('game-overlay').style.display = 'flex';
        }

        function fecharOverlay() {
            document.getElementById('game-overlay').style.display = 'none';
        }
    </script>
</body>
</html>
